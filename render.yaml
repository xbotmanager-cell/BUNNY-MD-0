services:
  - type: web
    name: bunny-md-bot
    env: node
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: SESSION_ID
        sync: false
      - key: PREFIX
        sync: false
        value: "∆"
      - key: BOT_NAME
        sync: false
        value: "BUNNY MD"
